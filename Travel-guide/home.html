<!DOCTYPE html>
<html>
<head>
  <title>Travel Guide</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 🔝 NAVBAR -->

<header class="navbar">
  <div class="logo">TravelGuide</div>

  <nav class="menu-right">
    <a href="#">service </a>
    <a href="#" id="loginBtn">Login</a>
    
  </nav>
</header>

<!-- 🎬 HERO SECTION -->
<section class="hero">

  <video autoplay muted loop class="bg-video">
    <source src="video/travel.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <!-- ✨ HERO TEXT -->
  <div class="hero-text">
    <h1>Explore the world with TravelGuide ✈️</h1>
    <p>Your journey begins here</p>
  </div>

  <!-- 🔍 SEARCH -->
  <div class="search-box">

    <div class="input-group">
      <label>Destination</label>
      <input type="text" placeholder="Search destination...">
    </div>

    <div class="input-group">
      <label>Check-in</label>
      <input type="date">
    </div>

    <div class="input-group">
      <label>Check-out</label>
      <input type="date">
    </div>

    <div class="range-box">
  <label>Budget</label>
  <span id="budgetValue">₹2000</span>
  <input type="range" min="500" max="10000" value="2000" id="budgetRange">
</div>

    <button>Search</button>
  </div>

</section>

<div id="destinations"></div>
<!-- 🔐 LOGIN MODAL -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h3>Login</h3>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <button>Login</button>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
